<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodly - Welcome</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/style.css">
    <script type="module" src="index.js"></script>
</head>
<body>
    <header>
        <h1>Welcome to Foodly!!</h1>
    </header>

    <main>
        <div class="login-welcome-container">
            <div class="welcome-buttons">
                <button id="authBt">Log in!</button>
                <button id="registerBt">Sign up!</button>
            </div>
        </div>
    </main>

    <footer>
        <p>Fish & Chips</p>
    </footer>

    <dialog id="loginDialog">
        <form id="loginForm" action="/api/login" method="POST">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <div class="button-container">
                <button type="submit">Login</button>
                <button type="button" id="cancelLogin">Cancel</button>
            </div>
        </form>
    </dialog>

    <dialog id="registerDialog">
        <form id="registerForm">
            <label for="regName">Name:</label>
            <input type="text" id="regName" name="name" required>
            <label for="regEmail">Email:</label>
            <input type="email" id="regEmail" name="email" required>
            <label for="regPassword">Password:</label>
            <input type="password" id="regPassword" name="password" required>
            <div class="button-container">
                <button type="submit">Register</button>
                <button type="button" id="cancelRegister">Cancel</button>
            </div>
        </form>
    </dialog>

</body>
</html>
