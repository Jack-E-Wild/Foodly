<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodly - Dashboard</title>
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/main-page.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/macro-chart.css">
    <link rel="stylesheet" href="/css/navigation.css">
    <script src="logger.js"></script>
    <script src="updateMacroChart.js"></script>
    <script type="module" src="main-page.js"></script>
</head>
<body>
    <header class="main-header">
        <div class="header-left"></div>
        <div class="header-center"></div>
            <h1>Foodly</h1>
        <div class="header-right">
            <img id="userAvatar" class="user-avatar" src="" alt="Avatar" style="display: none;">
        </div>
    </header>
    <main>
        <section id="screen-groups" class="app-screen">
            <div class="total-ratio-track">
                <div id="bar-protein" class="bar fill-protein"></div>
                <div id="bar-carbs" class="bar fill-carbs"></div>
                <div id="bar-fats" class="bar fill-fats"></div>
                <div id="bar-fibers" class="bar fill-fibers"></div>
            </div>
            <div class="groups-grid" id="groups-container"></div>
        </section>

        <section id="screen-cooking" class="app-screen">
            <div id="ingredients-list"></div>

            <button id="universalBackBt" class="btn-secondary back-btn-cooking">⬅ Back to Groups</button>
        </section>

        <div id="app-navigation-menu"></div>
    </main>
    <footer>
        <div class="footer-logo-container">
            <img src="/images/fish.png" alt="Fish" class="footer-logo">
            <p> & </p>
            <img src="/images/chip.png" alt="Chips" class="footer-logo">
        </div>
    </footer>


    <dialog id="amountDialog" class="modal">
        <div class="modal-content">
            <h3 id="modalIngredientName">Ingredient</h3>
            <p>How much do you want to add?</p>
            <input type="number" id="modalGramInput" placeholder="Gramm" min="0">
            <div class="modal-buttons">
                <button id="modalCancelBt">Cancel</button>
                <button id="modalConfirmBt">Add</button>
            </div>
        </div>
    </dialog>

    <div id="search-bar-bottom">
        <div class="search-wrapper">
            <input type="text" id="globalSearchInput" placeholder="Search Ingredients here! " style="display: none;">
            <button id="globalSearchBt" style="display: none;">Search</button>
        </div>
    </div>
</body>
</html>
