<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodly - Dashboard</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/main-page.css">
    <script type="module" src="main-page.js"></script>
</head>
<body>
    <header>
        <button id="universalBackBt" class="back-bt" style="display: none;">↻ Back</button>
        <h1>Foodly</h1>

        <div class="header-right">
            <input type="text" id="globalSearchInput" placeholder="Search" style="display: none;">
            <button id="globalSearchBt" style="display: none;">Search</button>
            <img id="userAvatar" class="user-avatar" src="" alt="Avatar" style="display: none;">
            <button id="universalNextBt" class="next-bt" style="display: none;">Forward ➔</button>
        </div>
    </header>
    <main>
        <section id="screen-start" class="app-start active">
            <div class="board-container">
                <button id="cookingBoardBt">Let's cook!</button>
                <button id="logoutBt" class="logoutBt">Logout</button>
            </div>
        </section>

        <section id="screen-groups" class="app-screen">
            <div class="groups-grid" id="groups-container"></div>
            <div class="dashboard-menu-buttons">
                <button id="goToPotBt" class="menu-btn-pot">View Virtual Pot</button>
                <button id="goToStatsBt" class="menu-btn-stats">View Statistics</button>
            </div>
        </section>

        <section id="screen-cooking" class="app-screen">
            <h2>What do you want to add?</h2>
            <div id="ingredients-list"></div>
            <div class="dashboard-menu-buttons">
                <button id="cookingToPotBt" class="menu-btn-pot">Go to Pot ➔</button>
            </div>
        </section>
    </main>
    <footer>
        <p>Fish & Chips</p>
    </footer>
    <dialog id="amountDialog" class="modal">
        <div class="modal-content">
            <h3 id="modalIngredientName">Ingredient</h3>
            <p>How much do you want to add?</p>
            <input type="number" id="modalGramInput" placeholder="Gramm" min="0">
            <div class="modal-buttons">
                <button id="modalCancelBt">Cancel</button>
                <button id="modalConfirmBt">Add</button>
            </div>
        </div>
    </dialog>
</body>
</html>
