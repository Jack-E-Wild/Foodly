<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodly - Virtual Pot</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/pot.css">
    <script src="logger.js"></script>
    <script type="module" src="pot.js"></script>
</head>
<body>
<header>
    <button id="potBackBt" class="back-bt">↻ Back</button>
    <h1>Virtual Pot</h1>

    <div class="header-right">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar" style="display: none;">
    </div>
</header>
<main>
    <section id="screen-pot" class="app-screen active">
        <h2>Your Virtual Pot</h2>
        <div id="pot-ingredients-container"></div>

        <div class="pot-navigation-buttons">
            <button id="potAddMoreBt">Add more ingredients</button>
            <button id="potToStatsBt" class="next-bt">Go to Stats ➔</button>
        </div>
    </section>
</main>
<footer>
    <p>Fish & Chips</p>
</footer>
</body>
</html>
